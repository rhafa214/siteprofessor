<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EduAssistente</title>
    <meta name="theme-color" content="#4f46e5" />
    <link rel="apple-touch-icon" href="/app-icon.png?v=2" />
    <link rel="icon" type="image/png" href="/app-icon.png?v=2" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      window.addEventListener("error", (e) => {
        fetch("/api/client-error", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: e.message, filename: e.filename, lineno: e.lineno, colno: e.colno, error: e.error?.stack })
        }).catch(()=>console.error("Failed to log error to backend"));
      });
      window.addEventListener("unhandledrejection", (e) => {
        const errorStr = String(e.reason?.stack || e.reason);
        if (errorStr.includes("Failed to fetch dynamically imported module") || errorStr.includes("Importing a module script failed") || errorStr.includes("ChunkLoadError")) {
          const isReloaded = sessionStorage.getItem('chunk_reloaded');
          if (!isReloaded) {
            sessionStorage.setItem('chunk_reloaded', 'true');
            console.warn("Chunk load error detected. Auto-reloading page...");
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {  
                  registration.unregister();
                }
                window.location.reload();
              });
            } else {
              window.location.reload();
            }
            e.preventDefault();
            return;
          }
        }
        fetch("/api/client-error", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: "Unhandled Rejection", error: errorStr })
        }).catch(()=>console.error("Failed to log error to backend"));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
